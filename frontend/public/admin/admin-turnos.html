<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Turnos - Don Fano</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gestión de turnos - Don Fano">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/menu.css" />
  <link rel="stylesheet" href="../css/admin-pages.css" />
</head>
<body>
<div id="toast-container"></div>
<div class="main-layout">

  <aside class="sidebar">
    <div>
      <div class="sidebar-logo">
        <img src="../img/logo.png" alt="Don Fano Logo" />
        <h2>Don Fano</h2>
        <span>Panel Admin</span>
      </div>

      <nav class="sidebar-menu">
        <a href="admin-dashboard.html" class="sidebar-link">
          <i class="fas fa-chart-line"></i> Dashboard
        </a>
        <a href="admin-trabajadores.html" class="sidebar-link">
          <i class="fas fa-users"></i> Trabajadores
        </a>
        <a href="admin-turnos.html" class="sidebar-link active">
          <i class="fas fa-calendar-alt"></i> Turnos
        </a>
        <a href="admin-reportes.html" class="sidebar-link">
          <i class="fas fa-file-alt"></i> Reportes
        </a>
        <a href="../panel-qr.html" class="sidebar-link">
          <i class="fas fa-qrcode"></i> Panel QR
        </a>
      </nav>
    </div>
    <div class="sidebar-footer">
      <button id="btnLogout" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> Cerrar sesión
      </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="page-header-top">
      <div>
        <h1 class="page-title">Gestión de Turnos</h1>
        <p class="page-subtitle">Asigna y administra los turnos de los empleados.</p>
      </div>
    </header>

    <!-- FORM -->
    <section class="form-section card">
      <h2>Crear turno</h2>

      <form id="formTurno">
        <div class="form-grid">
          <div class="form-field">
            <label for="workerId"><i class="fas fa-user" style="color:var(--primary)"></i> Trabajador</label>
            <select id="workerId"><option value="">Cargando...</option></select>
          </div>
          <div class="form-field">
            <label for="fechaTurno"><i class="fas fa-calendar" style="color:var(--primary)"></i> Fecha</label>
            <input type="date" id="fechaTurno" required />
          </div>
          <div class="form-field">
            <label for="horaInicio"><i class="fas fa-clock" style="color:var(--primary)"></i> Hora inicio</label>
            <input type="time" id="horaInicio" required />
          </div>
          <div class="form-field">
            <label for="horaFin"><i class="fas fa-clock" style="color:var(--primary-dark)"></i> Hora fin</label>
            <input type="time" id="horaFin" required />
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">
            <i class="fas fa-plus-circle"></i> Registrar turno
          </button>
        </div>
      </form>
    </section>

    <!-- LISTA -->
    <section class="list-section card">
      <h2>Turnos registrados</h2>

      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th>Empleado</th>
              <th>Fecha</th>
              <th>Hora inicio</th>
              <th>Hora fin</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="tablaTurnos">
            <tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-secondary)">
              <i class="fas fa-spinner fa-spin" style="margin-right:8px"></i>Cargando...
            </td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

</div>

<script src="../scripts/menu-admin.js"></script>
<script src="../scripts/admin-turnos.js"></script>
</body>
</html>
