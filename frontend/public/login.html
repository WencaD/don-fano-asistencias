<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Iniciar sesión en WorkSync - Sistema de Control de Asistencias">
  <title>Iniciar Sesión – WorkSync</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <!-- Fondo restaurante -->
  <div class="login-bg" aria-hidden="true"></div>

  <!-- Página principal -->
  <main class="login-page">
    <div class="login-card">

      <!-- Logo -->
      <div class="card-logo">
        <div class="logo-icon"><i class="fas fa-clock"></i></div>
      </div>

      <!-- Título -->
      <div class="card-header">
        <h1>WorkSync</h1>
        <p class="tagline">Plataforma SaaS</p>
      </div>

      <!-- Formulario -->
      <form id="loginForm" class="login-form" novalidate autocomplete="on">

        <!-- Usuario -->
        <div class="field-group">
          <label class="field-label" for="username">
            <i class="fas fa-user"></i> Usuario o correo
          </label>
          <div class="input-wrap">
            <input
              type="text"
              id="username"
              name="username"
              class="field-input"
              placeholder="Ingresa tu usuario o correo"
              required
              autocomplete="username"
              spellcheck="false"
            >
          </div>
        </div>

        <!-- Contraseña -->
        <div class="field-group">
          <label class="field-label" for="password">
            <i class="fas fa-lock"></i> Contraseña
          </label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              class="field-input"
              placeholder="Ingresa tu contraseña"
              required
              autocomplete="current-password"
            >
            <button type="button" class="toggle-pass" id="togglePassword" aria-label="Mostrar/ocultar contraseña">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Extras: recordar / olvidé -->
        <div class="form-extras">
          <label class="remember-label">
            <input type="checkbox" id="rememberMe" name="remember">
            Recordar sesión
          </label>
          <a href="#" class="forgot-link" id="forgotLink">¿Olvidaste tu contraseña?</a>
        </div>

        <!-- Botón -->
        <button type="submit" class="btn-login" id="btnLogin">
          <div class="spinner" id="loginSpinner"></div>
          <span id="btnLoginText">Ingresar al Sistema</span>
          <i class="fas fa-arrow-right arrow-icon" id="btnArrow"></i>
        </button>

        <!-- Error -->
        <p id="errorText" class="error-msg" role="alert"></p>

      </form>

      <!-- Footer de la tarjeta -->
      <div class="card-footer">
        <p>¿Problemas para acceder? <a href="mailto:soporte@worksync.com">Contacta a soporte</a></p>
        <p class="back-link-container"><a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al inicio</a></p>
      </div>

    </div>
  </main>

  <!-- Pie de página -->
  <footer class="page-footer">
    WorkSync SaaS &copy; 2026 - Plataforma de Asistencia
  </footer>

  <script src="scripts/login.js"></script>

</body>
</html>
