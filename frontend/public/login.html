<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Iniciar sesión en Don Fano - Sistema de Asistencias de personal">
  <title>Iniciar Sesión – Don Fano</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <!-- Fondo restaurante -->
  <div class="login-bg" aria-hidden="true"></div>

  <!-- Página principal -->
  <main class="login-page">
    <div class="login-card">

      <!-- Logo -->
      <div class="card-logo">
        <img src="img/logo.png" alt="Logo Don Fano">
      </div>

      <!-- Título -->
      <div class="card-header">
        <h1>Don Fano</h1>
        <p class="tagline">Sistema de Asistencias</p>
      </div>

      <!-- Formulario -->
      <form id="loginForm" class="login-form" novalidate autocomplete="on">

        <!-- Usuario -->
        <div class="field-group">
          <label class="field-label" for="username">
            <i class="fas fa-user"></i> Usuario o correo
          </label>
          <div class="input-wrap">
            <input
              type="text"
              id="username"
              name="username"
              class="field-input"
              placeholder="Ingresa tu usuario o correo"
              required
              autocomplete="username"
              spellcheck="false"
            >
          </div>
        </div>

        <!-- Contraseña -->
        <div class="field-group">
          <label class="field-label" for="password">
            <i class="fas fa-lock"></i> Contraseña
          </label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              class="field-input"
              placeholder="Ingresa tu contraseña"
              required
              autocomplete="current-password"
            >
            <button type="button" class="toggle-pass" id="togglePassword" aria-label="Mostrar/ocultar contraseña">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Extras: recordar / olvidé -->
        <div class="form-extras">
          <label class="remember-label">
            <input type="checkbox" id="rememberMe" name="remember">
            Recordar sesión
          </label>
          <a href="#" class="forgot-link" id="forgotLink">¿Olvidaste tu contraseña?</a>
        </div>

        <!-- Botón -->
        <button type="submit" class="btn-login" id="btnLogin">
          <div class="spinner" id="loginSpinner"></div>
          <span id="btnLoginText">Ingresar al Sistema</span>
          <i class="fas fa-arrow-right arrow-icon" id="btnArrow"></i>
        </button>

        <!-- Error -->
        <p id="errorText" class="error-msg" role="alert"></p>

      </form>

      <!-- Footer de la tarjeta -->
      <div class="card-footer">
        <p>¿Problemas para acceder? <a href="mailto:admin@donfano.com">Contacta al administrador</a></p>
        <p style="margin-top: 15px;"><a href="index.html" style="color: var(--text-light); text-decoration: none; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; transition: color 0.3s;"><i class="fas fa-arrow-left"></i> Volver al inicio</a></p>
      </div>

    </div>
  </main>

  <!-- Pie de página -->
  <footer class="page-footer">
    Footer info: Trattoria &amp; Don Fano (RS)
  </footer>

  <script>
    // ── Toggle visibilidad contraseña ──────────────────
    const toggleBtn   = document.getElementById('togglePassword');
    const passInput   = document.getElementById('password');

    toggleBtn.addEventListener('click', () => {
      const isPass = passInput.type === 'password';
      passInput.type = isPass ? 'text' : 'password';
      toggleBtn.innerHTML = isPass
        ? '<i class="fas fa-eye-slash"></i>'
        : '<i class="fas fa-eye"></i>';
    });

    // ── Recordar sesión ────────────────────────────────
    const rememberMe  = document.getElementById('rememberMe');
    const usernameIn  = document.getElementById('username');
    const saved = localStorage.getItem('df_saved_user');
    if (saved) {
      usernameIn.value = saved;
      rememberMe.checked = true;
    }

    // ── Login ──────────────────────────────────────────
    const form        = document.getElementById('loginForm');
    const errorText   = document.getElementById('errorText');
    const btnLogin    = document.getElementById('btnLogin');
    const spinner     = document.getElementById('loginSpinner');
    const btnText     = document.getElementById('btnLoginText');
    const btnArrow    = document.getElementById('btnArrow');

    function setLoading(loading) {
      btnLogin.disabled    = loading;
      spinner.style.display  = loading ? 'block' : 'none';
      btnText.textContent    = loading ? 'Iniciando...' : 'Ingresar al Sistema';
      btnArrow.style.display = loading ? 'none' : 'inline';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorText.textContent = '';

      const username = usernameIn.value.trim();
      const password = passInput.value.trim();

      if (!username || !password) {
        errorText.textContent = 'Por favor completa todos los campos.';
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorText.textContent = data.error || 'Credenciales incorrectas. Intenta de nuevo.';
          setLoading(false);
          return;
        }

        // Guardar sesión
        localStorage.setItem('token', data.token);
        localStorage.setItem('role',  data.role);
        localStorage.setItem('user',  JSON.stringify(data.user));

        if (rememberMe.checked) {
          localStorage.setItem('df_saved_user', username);
        } else {
          localStorage.removeItem('df_saved_user');
        }

        // Redirigir según rol
        if (data.role === 'ADMIN') {
          window.location.href = '/admin/admin-dashboard.html';
        } else if (data.role === 'WORKER') {
          window.location.href = '/empleado/empleado-dashboard.html';
        } else {
          errorText.textContent = 'Rol de usuario no reconocido.';
          setLoading(false);
        }

      } catch (err) {
        console.error('Login error:', err);
        errorText.textContent = 'Error de conexión con el servidor. Intenta de nuevo.';
        setLoading(false);
      }
    });

    // ── Olvidé contraseña ──────────────────────────────
    document.getElementById('forgotLink').addEventListener('click', (e) => {
      e.preventDefault();
      alert('Contacta al administrador del sistema para restablecer tu contraseña.\n\nAdmin: admin@donfano.com');
    });
  </script>

</body>
</html>
