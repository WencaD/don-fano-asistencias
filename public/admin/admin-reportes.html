<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Reportes - Don Fano</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/menu.css" />
  <link rel="stylesheet" href="../css/reportes.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="main-layout">

  <aside class="sidebar">
    <div>
      <div class="sidebar-logo">
        <img src="../img/logo.png" alt="Don Fano Logo" />
        <div class="logo-text">
          <h2>Don Fano</h2>
          <span>Trattoria - Pizzería</span>
        </div>
      </div>

      <nav class="sidebar-menu">
        <a href="admin-dashboard.html" class="sidebar-link">
          <i class="fas fa-chart-line"></i>
          <span>Dashboard</span>
        </a>
        <a href="admin-trabajadores.html" class="sidebar-link">
          <i class="fas fa-users"></i>
          <span>Trabajadores</span>
        </a>
        <a href="admin-turnos.html" class="sidebar-link">
          <i class="fas fa-calendar-alt"></i>
          <span>Turnos</span>
        </a>
        <a href="admin-reportes.html" class="sidebar-link active">
          <i class="fas fa-file-alt"></i>
          <span>Reportes</span>
        </a>
        <a href="../panel-qr.html" class="sidebar-link">
          <i class="fas fa-qrcode"></i>
          <span>Panel QR</span>
        </a>
      </nav>
    </div>
    <div class="sidebar-footer">
      <button id="btnLogout" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i>
        <span>Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h1 class="page-title">
          <i class="fas fa-file-chart-line"></i>
          Reportes de Asistencia
        </h1>
        <p class="page-subtitle">Consulta entradas, salidas, tardanzas y faltas</p>
      </div>
    </header>

    <!-- FILTROS -->
    <section class="filters-section card">
      <div class="card-header">
        <h2>
          <i class="fas fa-filter"></i>
          Filtros de búsqueda
        </h2>
      </div>

      <form id="formReportes">
        <div class="form-grid">
          <div class="form-field">
            <label for="desde">
              <i class="fas fa-calendar-day"></i>
              Desde
            </label>
            <input type="date" id="desde" required />
          </div>
          <div class="form-field">
            <label for="hasta">
              <i class="fas fa-calendar-day"></i>
              Hasta
            </label>
            <input type="date" id="hasta" required />
          </div>
          <div class="form-field">
            <label for="workerReporte">
              <i class="fas fa-user"></i>
              Trabajador (opcional)
            </label>
            <select id="workerReporte">
              <option value="">Todos</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">
            <i class="fas fa-search"></i>
            Buscar Reportes
          </button>
        </div>
      </form>
    </section>

    <!-- RESULTADOS -->
    <section class="list-section card">
      <div class="card-header">
        <h2>
          <i class="fas fa-table"></i>
          Resultados
        </h2>
      </div>

      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Trabajador</th>
              <th>Entrada</th>
              <th>Salida</th>
              <th>Estado</th>
              <th>Min. tarde</th>
            </tr>
          </thead>
          <tbody id="tablaReportes">
            <tr><td colspan="6">Sin datos</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

</div>

<script src="../scripts/menu-admin.js"></script>
<script src="../scripts/admin-reportes.js"></script>
</body>
</html>
