<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Trabajadores - Don Fano</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/menu.css" />
  <link rel="stylesheet" href="../css/trabajadores.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="main-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div>
      <div class="sidebar-logo">
        <img src="../img/logo.png" alt="Don Fano Logo" />
        <div class="logo-text">
          <h2>Don Fano</h2>
          <span>Trattoria - Pizzería</span>
        </div>
      </div>

      <nav class="sidebar-menu">
        <a href="admin-dashboard.html" class="sidebar-link">
          <i class="fas fa-chart-line"></i>
          <span>Dashboard</span>
        </a>
        <a href="admin-trabajadores.html" class="sidebar-link active">
          <i class="fas fa-users"></i>
          <span>Trabajadores</span>
        </a>
        <a href="admin-turnos.html" class="sidebar-link">
          <i class="fas fa-calendar-alt"></i>
          <span>Turnos</span>
        </a>
        <a href="admin-reportes.html" class="sidebar-link">
          <i class="fas fa-file-alt"></i>
          <span>Reportes</span>
        </a>
        <a href="../panel-qr.html" class="sidebar-link">
          <i class="fas fa-qrcode"></i>
          <span>Panel QR</span>
        </a>
      </nav>
    </div>

    <div class="sidebar-footer">
      <button id="btnLogout" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i>
        <span>Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <!-- CONTENIDO -->
  <main class="main-content">
    <header class="page-header">
      <div>
        <h1 class="page-title">
          <i class="fas fa-users"></i>
          Gestión de Trabajadores
        </h1>
        <p class="page-subtitle">
          Administra los datos de los empleados registrados
        </p>
      </div>
    </header>

    <!-- REGISTRAR -->
    <section class="form-section card">
      <div class="card-header">
        <h2>
          <i class="fas fa-user-plus"></i>
          Registrar trabajador
        </h2>
        <p class="card-subtitle">
          Crea la cuenta y los datos del nuevo empleado
        </p>
      </div>

      <form id="formTrabajador">
        <div class="form-grid">
          <div class="form-field">
            <label for="nombre">
              <i class="fas fa-user"></i>
              Nombre completo
            </label>
            <input type="text" id="nombre" placeholder="Ingrese el nombre completo" required />
          </div>
          <div class="form-field">
            <label for="dni">
              <i class="fas fa-id-card"></i>
              DNI
            </label>
            <input type="text" id="dni" placeholder="Ej: 12345678" required />
          </div>
          <div class="form-field">
            <label for="correo">
              <i class="fas fa-envelope"></i>
              Correo
            </label>
            <input type="email" id="correo" placeholder="ejemplo@correo.com" required />
          </div>
          <div class="form-field">
            <label for="area">
              <i class="fas fa-building"></i>
              Área
            </label>
            <select id="area">
              <option value="Cocina">Cocina</option>
              <option value="Caja">Caja</option>
              <option value="Delivery">Delivery</option>
            </select>
          </div>
          <div class="form-field">
            <label for="rol">
              <i class="fas fa-user-tag"></i>
              Rol
            </label>
            <select id="rol">
              <option value="Empleado">Empleado</option>
              <option value="Administrador">Administrador</option>
            </select>
          </div>
          <div class="form-field">
            <label for="salario_hora">
              <i class="fas fa-money-bill-wave"></i>
              Salario por hora (S/)
            </label>
            <input type="number" id="salario_hora" value="0" min="0" placeholder="0.00" />
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">
            <i class="fas fa-save"></i>
            Registrar Trabajador
          </button>
        </div>
      </form>
    </section>

    <!-- LISTA -->
    <section class="list-section card">
      <div class="card-header">
        <h2>
          <i class="fas fa-list"></i>
          Lista de trabajadores
        </h2>
      </div>

      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>DNI</th>
              <th>Correo</th>
              <th>Área</th>
              <th>Rol</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="tablaTrabajadores">
            <tr><td colspan="7">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

</div>

<script src="../scripts/menu-admin.js"></script>
<script src="../scripts/admin-trabajadores.js"></script>
</body>
</html>
