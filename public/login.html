<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión - Don Fano</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <!-- Partículas de fondo -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="login-container">

    <div class="login-card">

      <div class="login-header">
        <div class="logo-circle">
          <img src="/img/logo.png" alt="Don Fano Logo" class="logo-img">
        </div>
        <h2>Don Fano</h2>
        <p class="subtitle">Sistema de Control de Asistencias</p>
      </div>

      <form id="loginForm">

        <div class="form-group">
          <label><i class="fas fa-user"></i> Usuario o correo</label>
          <div class="input-wrapper">
            <i class="fas fa-user-circle input-icon"></i>
            <input type="text" id="username" placeholder="Ingresa tu usuario" required>
          </div>
        </div>

        <div class="form-group">
          <label><i class="fas fa-lock"></i> Contraseña</label>
          <div class="input-wrapper">
            <i class="fas fa-key input-icon"></i>
            <input type="password" id="password" placeholder="********" required>
            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="remember">
            <span>Recordarme</span>
          </label>
          <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-login">
          <span>Ingresar</span>
          <i class="fas fa-arrow-right"></i>
        </button>

        <p id="errorText" class="error-text"></p>

      </form>

      <div class="login-footer">
        <p>¿No tienes cuenta? <a href="#">Contacta al administrador</a></p>
      </div>

    </div>

    <a href="/" class="back-home">
      <i class="fas fa-home"></i> Volver al inicio
    </a>

  </div>

  <script src="scripts/login.js"></script>
  <script>
    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
      const password = document.getElementById('password');
      const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
      password.setAttribute('type', type);
      this.classList.toggle('fa-eye');
      this.classList.toggle('fa-eye-slash');
    });
  </script>

</body>
</html>
