<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Escaner QR - Don Fano</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/empleado.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<div class="main-layout">
    <aside class="sidebar">
        <div>
            <div class="sidebar-logo">
                <img src="../img/logo.png" alt="Don Fano Logo" />
                <div class="logo-text">
                  <h2>Don Fano</h2>
                  <span>Empleado</span>
                </div>
            </div>
            <nav class="sidebar-menu">
                <a href="empleado-dashboard.html" class="sidebar-link">
                  <i class="fas fa-tachometer-alt"></i> Mi Panel
                </a>
            </nav>
        </div>
        <div class="sidebar-footer">
            <button id="btnLogout" class="logout-btn">
              <i class="fas fa-sign-out-alt"></i> Cerrar sesión
            </button>
        </div>
    </aside>    <main class="main-content">
        <div class="scanner-container">
            <div class="scanner-header">
              <h2><i class="fas fa-qrcode"></i> Escanear Código QR</h2>
              <p>Apunta tu cámara al código de marcación de la pizzería</p>
            </div>            <div id="reader"></div>

            <p id="result" style="margin-top: 15px; font-weight: bold; color: green;"></p>
        </div>
    </main>
</div>

<script src="../scripts/logout.js"></script>
<script>
  // =========================================================================
  // === LÓGICA DE VERIFICACIÓN DE SESIÓN ===
  // =========================================================================
  const token = localStorage.getItem("token");
  const userRaw = localStorage.getItem("user");
  let workerId = null;

  try {
    const usuario = JSON.parse(userRaw);
    workerId = usuario.workerId;
    if (!token || !workerId || usuario.role !== "WORKER") {
      throw new Error("Sesión inválida.");
    }
  } catch (e) {
    localStorage.clear();
    window.location.href = "../login.html";
    return;
  }

  // --- Variables Globales del Escáner ---
  const resultDiv = document.getElementById("result");
  const html5QrCode = new Html5Qrcode("reader"); 

  // =========================================================================
  // === 1. FUNCIÓN DE ÉXITO (Manejo de la Petición al Servidor) ===
  // =========================================================================
  async function onScanSuccess(decodedText, decodedResult) {
    // Detener el escáner al tener éxito
    html5QrCode.stop().catch(err => console.error("Error deteniendo el escáner:", err));

    resultDiv.textContent = "Código detectado. Marcando asistencia...";
    resultDiv.style.color = '#ff7b00'; 

    try {
      // Usar la ruta completa si es necesario, pero '/api/qr/mark' es más limpio
      const res = await fetch("/api/qr/mark", { 
        method: "POST",
        headers: { 
          "Content-Type": "application/json",
          // ⚠️ Aquí deberías enviar el token JWT para autenticación ⚠️
          "Authorization": `Bearer ${token}` 
        }, 
        body: JSON.stringify({
          workerId: workerId,
          codigo: decodedText.trim()
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Fallo de servidor al marcar.");
      }

      resultDiv.textContent = "✅ " + (data.message || "Asistencia marcada correctamente.");
      resultDiv.style.color = 'green';
      
      setTimeout(() => {
          window.location.href = "empleado-dashboard.html";
      }, 2000);

    } catch (err) {
      resultDiv.textContent = "❌ ERROR: " + err.message;
      resultDiv.style.color = 'red';
      
      setTimeout(() => {
          window.location.href = "scanner.html";
      }, 3000);
    }
  }

  // =========================================================================
  // === 2. FUNCIÓN DE INICIALIZACIÓN (ASÍNCRONA) - CORREGIDA ===
  // =========================================================================
  async function startScanner() {
    try {
        // Objeto de configuración para la inicialización del escáner
        const config = { 
            fps: 10, 
            qrbox: { width: 250, height: 250 },
            // Preferencia explícita por la cámara trasera (más fiable en móviles)
            facingMode: "environment" 
        };
        
        resultDiv.textContent = "Intentando iniciar la cámara...";
        resultDiv.style.color = 'blue';

        // ⚠️ CAMBIO CRÍTICO: Usamos el constraint 'environment' para forzar la cámara trasera
        await html5QrCode.start(
            { facingMode: "environment" }, // Constraint para la cámara trasera
            config,                       // Configuración de visualización y FPS
            onScanSuccess, 
            (errorMessage) => { /* Ignorar fallos de lectura */ }
        );
        
        // Si llega aquí, la cámara se inició con éxito
        resultDiv.textContent = "Cámara iniciada. Apunta al QR.";

    } catch (error) {
        // Manejo de error específico para problemas de cámara/permisos/HTTPS
        let errorMessage = "Error al acceder a la cámara. ";
        if (error.message.includes("Permission denied")) {
             errorMessage += "Debe conceder permiso de cámara.";
        } else if (window.location.protocol === "http:" && window.location.hostname !== "localhost") {
             errorMessage += "Bloqueado por protocolo HTTP. Pruebe con HTTPS o localhost.";
        } else {
             errorMessage += "Verifique los permisos en la configuración del navegador.";
        }

        resultDiv.textContent = "❌ " + errorMessage;
        resultDiv.style.color = 'red';
        console.error("Error iniciando el escáner:", error);
    }
  }

  // =========================================================================
  // === 3. INICIO EN EL EVENTO DE CARGA ===
  // =========================================================================
  document.addEventListener("DOMContentLoaded", () => {
      setTimeout(startScanner, 500); 
  });
</script>

</body>
</html>
